baseURL = "https://yonatankarp.github.io/"
title = "Yonatan Karp-Rudin"
languageCode = "en"

[pagination]
pagerSize = 5

[outputs]
  page = ["HTML"]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]

[taxonomies]
  tag = "tags"
  category = "categories"

disableKinds = ["footerSection"]
ignoreFiles = ["\\.he\\.md$"]

[module]
[[module.mounts]]
source = "archetypes"
target = "archetypes"

[[module.mounts]]
source = "assets"
target = "assets"

[[module.mounts]]
source = "i18n"
target = "i18n"

[[module.mounts]]
source = "layouts"
target = "layouts"

[[module.mounts]]
source = "static"
target = "static"

[params]
title = "Yonatan Karp-Rudin - Staff Software Engineer"
description = "Staff Software Engineer based in Berlin. Building payment and compliance systems at Billie. Open source contributor."
images = ["/img/og-img.png"]

[params.seo]
siteName = "Yonatan Karp-Rudin"
siteDescription = "Staff Software Engineer based in Berlin. Building payment and compliance systems at Billie."

[params.social]
twitter = "yonvata"

[params.seo.person]
name = "Yonatan Karp-Rudin"
url = "https://yonatankarp.github.io"
sameAs = [
  "https://github.com/yonatankarp",
  "https://linkedin.com/in/yonatankarp",
  "https://kotlinbackend.com",
]
sections = [
  "showcase",
  "about",
  "education",
  "experience",
  "client-and-work",
  "contact",
]

homepageExperienceCount = 6

[params.blog]
recentPostCount = 5

# --- Languages ---

[languages]
[languages.en]
disabled = false
languageCode = "en"
languageDirection = "ltr"
languageName = "English"
weight = 1

[languages.he]
disabled = true
languageCode = "he"
languageDirection = "rtl"
languageName = "עברית"
weight = 2

# --- Menus ---

[menus]
[[menus.header]]
name = "Home"
URL = "/"
weight = 1
[[menus.header]]
name = "About"
URL = "/#about"
weight = 2
[[menus.header]]
name = "Experience"
URL = "/#experience"
weight = 3
[[menus.header]]
name = "Skills"
URL = "/skills"
weight = 4
[[menus.header]]
name = "Projects"
URL = "/#client-and-work-section"
weight = 5
[[menus.header]]
name = "Blog"
URL = "/blog"
weight = 6
[[menus.header]]
pre = "email"
name = "Contact"
URL = "/#contact"
weight = 7
[[menus.header]]
pre = "search"
name = "Search"
URL = "/search"
weight = 8

[[menus.footer]]
name = "Home"
URL = "/"
weight = 1
[[menus.footer]]
name = "About"
URL = "/#about"
weight = 2
[[menus.footer]]
name = "Projects"
URL = "/#client-and-work-section"
weight = 3
[[menus.footer]]
name = "Contact"
URL = "/#contact"
weight = 4

# --- Markup & Performance ---

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    lineNos = false
    noClasses = false
    style = "github"

[imaging]
  resampleFilter = "Lanczos"
  quality = 85
  anchor = "Smart"

[minify]
  disableCSS = false
  disableHTML = false
  disableJS = false
  disableJSON = false
  disableSVG = false
  disableXML = false
  minifyOutput = true
  [minify.tdewolff]
    [minify.tdewolff.html]
      keepDefaultAttrVals = true
      keepWhitespace = false
    [minify.tdewolff.css]
      precision = 0
    [minify.tdewolff.js]
      precision = 0

[build]
writeStats = true
[build.buildStats]
enabledFor = ["scss"]
disableClasses = false
disableIDs = false
disableTags = false
enable = true
