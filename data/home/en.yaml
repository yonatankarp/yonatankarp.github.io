about:
  kicker: "Positioning"
  title: "I sit between product ambiguity and production reality."
  paragraphs:
    - "The part of engineering I care about most is the part that survives the first release: ownership, contracts, failure modes, migration paths, runbooks, and enough written context that the next engineer can make a good decision without folklore."
    - "At Billie, that has meant staff-level work across risk, payments, and compliance: risk orchestration, fraud-provider integrations, compliance-service foundations, Kafka operational runbooks, Backstage tooling, and API-first practices across services. Earlier roles covered payment platforms at SumUp, distributed systems at NICE, and embedded vision-processing systems at Inuitive."
    - "I am not trying to make systems clever. I am trying to make them explicit, operable, and hard to misunderstand."
  facts:
    - label: "Works across"
      text: "Kotlin, Java, Spring Boot, Kafka, Flink, OpenAPI, Backstage, and service architecture"
    - label: "Bias toward"
      text: "Clear ownership, small contracts, boring reliability, and decisions people can revisit"

