proof:
  kicker: "Proof"
  title: "Examples of multiplying a team, not just finishing a ticket."
  items:
    - label: "Shared language"
      title: "Making messy domains easier for a team to reason about."
      context: "When a workflow crosses services, teams, vendors, and product assumptions, the hard part is often not the code. It is agreeing on what the system means."
      decision: "I turn that ambiguity into names, boundaries, examples, contracts, diagrams, and enough implementation detail to test the idea against reality."
      result: "The team gets a shared model it can use in planning, code review, debugging, onboarding, and the next round of changes."
    - label: "Reusable paths"
      title: "Turning repeated friction into tools and habits."
      context: "If several people are solving the same setup, monitoring, integration, or documentation problem, the organization is paying the cost more than once."
      decision: "I look for the small reusable piece: a template, a library, a Backstage tool, a runbook, a checklist, or a better example repository."
      result: "The next engineer starts from a clearer path instead of rediscovering the same context from memory."
    - label: "Public explanation"
      title: "Writing and OSS as part of the engineering work."
      context: "Explaining something well is a forcing function. It exposes gaps in the model and makes the useful parts available beyond the immediate conversation."
      decision: "I write, teach, contribute upstream, and publish small tools when a lesson is useful enough to be reused."
      result: "The work helps people outside the original team, and it makes my own thinking sharper for the next hard problem."

outcomes:
  kicker: "Multiplier effect"
  title: "What good teams get from working with me."
  items:
    - title: "Shared understanding"
      text: "People can talk about the system with the same words, fewer assumptions, and less folklore."
    - title: "Better decisions"
      text: "Tradeoffs are written down clearly enough that the team can challenge, revisit, and improve them."
    - title: "Reusable patterns"
      text: "Repeated problems become examples, libraries, templates, and habits instead of private knowledge."
    - title: "Stronger ownership"
      text: "The system is easier to change because more people understand how and why it works."

fit:
  kicker: "When to call"
  title: "I am useful when the team needs clarity as much as code."
  items:
    - "A problem is important, but the team is still arguing from different mental models."
    - "A backend system works, but too much of it depends on hidden context and a few people's memory."
    - "A repeated engineering problem deserves a reusable tool, template, library, or explanation."
    - "A team needs a senior engineer who can clarify the work, build the path, and help others own it."

