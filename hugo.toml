baseURL = "https://yonatankarp.github.io/"
title = "Yonatan Karp-Rudin"
languageCode = "en"

[pagination]
pagerSize = 10

[outputs]
  page = ["HTML"]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]
  footer = []

[taxonomies]
  tag = "tags"
  category = "categories"

disableKinds = ["footerSection"]

[module]
[[module.imports]]
path = "github.com/zetxek/adritian-free-hugo-theme"

[[module.mounts]]
source = "archetypes"
target = "archetypes"

[[module.mounts]]
source = "assets"
target = "assets"

[[module.mounts]]
source = "i18n"
target = "i18n"

[[module.mounts]]
source = "layouts"
target = "layouts"

[[module.mounts]]
source = "static"
target = "static"

[[module.mounts]]
source = "node_modules/bootstrap/scss"
target = "assets/scss/bootstrap"

[[module.mounts]]
source = "node_modules/bootstrap/dist/js"
target = "assets/js/bootstrap"

[[module.mounts]]
source = "node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"
target = "assets/js/vendor/bootstrap.bundle.min.js"

[[module.mounts]]
source = "node_modules/bootstrap-print-css/css/bootstrap-print.css"
target = "assets/css/bootstrap-print.css"

[params]
title = "Yonatan Karp-Rudin - Staff Software Engineer"
description = "Staff Software Engineer based in Berlin. Building payment and compliance systems at Billie. Open source contributor."
images = ["/img/og-img.png"]

[params.seo]
siteName = "Yonatan Karp-Rudin"
siteDescription = "Staff Software Engineer based in Berlin. Building payment and compliance systems at Billie."

[params.social]
twitter = "yonvata"

[params.seo.person]
name = "Yonatan Karp-Rudin"
url = "https://yonatankarp.github.io"
sameAs = [
  "https://github.com/yonatankarp",
  "https://linkedin.com/in/yonatankarp",
  "https://kotlinbackend.com",
]
sections = [
  "showcase",
  "about",
  "education",
  "experience",
  "client-and-work",
  "contact",
]

homepageExperienceCount = 6

[params.colorTheme.selector.disable]
footer = false
header = false
mobileHeader = false

[params.languages.selector.disable]
footer = false
header = false
mobileHeader = false

[params.plugins]

[[params.plugins.css]]
URL = "css/custom.css"
[[params.plugins.css]]
URL = "css/adritian-icons.css"
[[params.plugins.css]]
URL = "css/bootstrap-print.css"

[[params.plugins.js]]
URL = "js/rad-animations.js"
[[params.plugins.js]]
URL = "js/sticky-header.js"
[[params.plugins.js]]
URL = "js/library/fontfaceobserver.js"

[[params.plugins.scss]]
URL = "scss/adritian.scss"

[params.blog]
layout = "sidebar-right"
sidebarWidth = "25"
narrowContent = true
showCategories = true
showRecentPosts = true
recentPostCount = 5
listStyle = "summary"
listLayout = "default"

[params.experience]
showJobCard = true

