<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 120" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Concurrent execution: a single CPU rapidly alternates between Spotify and the video game">
  <defs>
    <marker id="arr2" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#8b8b9b"/>
    </marker>
  </defs>

  <text x="6" y="62" fill="#c9c9d6" font-size="15" font-weight="600">CPU 1</text>
  <line x1="62" y1="57" x2="100" y2="57" stroke="#8b8b9b" stroke-width="1.5"/>

  <!-- alternating slices on one lane -->
  <g font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">
    <rect x="100" y="34" width="88" height="46" rx="8" fill="#cf6347"/><text x="144" y="62">Spotify</text>
    <rect x="192" y="34" width="88" height="46" rx="8" fill="#5688b0"/><text x="236" y="62">Game</text>
    <rect x="284" y="34" width="88" height="46" rx="8" fill="#cf6347"/><text x="328" y="62">Spotify</text>
    <rect x="376" y="34" width="88" height="46" rx="8" fill="#5688b0"/><text x="420" y="62">Game</text>
    <rect x="468" y="34" width="88" height="46" rx="8" fill="#cf6347"/><text x="512" y="62">Spotify</text>
    <rect x="560" y="34" width="88" height="46" rx="8" fill="#5688b0"/><text x="604" y="62">Game</text>
  </g>

  <line x1="652" y1="57" x2="712" y2="57" stroke="#8b8b9b" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="712" y="100" text-anchor="end" fill="#8b8b9b" font-size="13">time →</text>
</svg>
