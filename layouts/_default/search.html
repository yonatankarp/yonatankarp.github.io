{{ define "main" }}
<section class="shell page-head reveal-group">
  <div class="page-head__copy reveal">
    <p class="section-kicker">Search</p>
    <h1>{{ .Title }}</h1>
    <p>{{ if eq .Site.Language.Lang "he" }}חיפוש פשוט במאמרים, פרויקטים ודפים באתר.{{ else }}A lightweight search across articles, projects, and pages on the site.{{ end }}</p>
  </div>
</section>
<section class="shell search-view reveal-group">
  <div class="reveal">
    <input id="site-search" class="search-input search-input--large" type="search" placeholder="{{ .Params.placeholder | default `Search...` }}">
    <div id="search-results" class="search-results"></div>
  </div>
</section>
{{ end }}
