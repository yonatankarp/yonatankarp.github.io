proof:
  kicker: "Proof"
  title: "Examples of staff-level leverage beyond ticket delivery."
  items:
    - label: "Compliance platform"
      title: "Creating a new service boundary for compliance workflows."
      context: "Transaction monitoring, screening, and sanction checks crossed product rules, vendor behavior, operational alerts, and audit expectations."
      decision: "I authored the technical spec and interface definitions, led the ComplyAdvantage integration, and paired the service design with explicit handling for Kafka DLT alerts, settlement reports, and compliance states."
      result: "The domain shifted from scattered operational knowledge into a service teams can reason about, monitor, and recover."
    - label: "Risk architecture"
      title: "Moving risk work toward explicit orchestration and contracts."
      context: "Risk decisions depended on multiple services, fraud providers, recurrent identification, tokenization, and direct debit behavior."
      decision: "I co-designed the Risk Orchestrator, pushed OpenAPI-first contracts across risk services, led the Ravelin integration, and authored the Buyer Risk Assessment target architecture."
      result: "Risk changes gained a clearer coordination model across fraud providers, payment behavior, and service boundaries."
    - label: "Engineering leverage"
      title: "Turning repeated operational friction into shared tooling."
      context: "Platform work is expensive when each incident, cronjob, migration, or service setup depends on private memory."
      decision: "I build Backstage tools, templates, migration plans, and upstream fixes when the reusable path is more valuable than another one-off patch."
      result: "Engineers start from a known path and can challenge decisions through specs, dashboards, examples, and code."

outcomes:
  kicker: "Multiplier effect"
  title: "What good teams get from working with me."
  items:
    - title: "Shared understanding"
      text: "People can talk about the system with the same words, fewer assumptions, and less folklore."
    - title: "Better decisions"
      text: "Tradeoffs are written down clearly enough that the team can challenge, revisit, and improve them."
    - title: "Reusable patterns"
      text: "Repeated problems become examples, libraries, templates, and habits instead of private knowledge."
    - title: "Stronger ownership"
      text: "The system is easier to change because more people understand how and why it works."

fit:
