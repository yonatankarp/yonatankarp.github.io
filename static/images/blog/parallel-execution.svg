<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 190" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Parallel execution: CPU 1 runs Spotify while CPU 2 runs a video game at the same time">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#8b8b9b"/>
    </marker>
  </defs>

  <!-- CPU 1 lane -->
  <text x="6" y="49" fill="#c9c9d6" font-size="15" font-weight="600">CPU 1</text>
  <line x1="62" y1="44" x2="104" y2="44" stroke="#8b8b9b" stroke-width="1.5"/>
  <rect x="104" y="21" width="540" height="46" rx="9" fill="#cf6347"/>
  <text x="374" y="50" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="600">Spotify</text>
  <line x1="648" y1="44" x2="712" y2="44" stroke="#8b8b9b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CPU 2 lane -->
  <text x="6" y="131" fill="#c9c9d6" font-size="15" font-weight="600">CPU 2</text>
  <line x1="62" y1="126" x2="150" y2="126" stroke="#8b8b9b" stroke-width="1.5"/>
  <rect x="150" y="103" width="494" height="46" rx="9" fill="#5688b0"/>
  <text x="397" y="132" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="600">My Favorite Video Game</text>
  <line x1="648" y1="126" x2="712" y2="126" stroke="#8b8b9b" stroke-width="1.5" marker-end="url(#arr)"/>

  <text x="712" y="170" text-anchor="end" fill="#8b8b9b" font-size="13">time →</text>
</svg>
