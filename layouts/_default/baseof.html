<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}" dir="{{ .Site.Language.Direction | default `ltr` }}" data-theme="dark">
  <head>
    {{ partial "head.html" . }}
  </head>
  <body class="page-{{ .Kind }}{{ if .IsHome }} page-home{{ end }}{{ with .Type }} type-{{ . }}{{ end }}">
    <a class="skip-link" href="#main-content">Skip to content</a>
    {{ partial "site-header.html" . }}
    <main id="main-content">
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "site-footer.html" . }}
    {{ $js := resources.Get "js/site.js" | minify | fingerprint }}
    <script defer src="{{ $js.RelPermalink }}" integrity="{{ $js.Data.Integrity }}"></script>
    {{ if .Store.Get "hasMermaid" }}
    <script type="module">
      import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
      mermaid.initialize({
        startOnLoad: true,
        theme: 'base',
        themeVariables: {
          fontFamily: 'Inter, system-ui, sans-serif',
          fontSize: '15px',
          background: 'transparent',
          primaryColor: '#3b3947',
          primaryTextColor: '#f2f2f8',
          primaryBorderColor: '#615f70',
          secondaryColor: '#343240',
          tertiaryColor: '#2c2a37',
          lineColor: '#a6a6b6',
          edgeLabelBackground: '#1b1a24',
          clusterBkg: 'transparent',
          clusterBorder: '#5c5a6b',
        },
      });
    </script>
    {{ end }}
  </body>
</html>
